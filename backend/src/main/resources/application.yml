server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/user_login?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: Y2xvdWQtbG9naW4tc2VjcmV0LWtleS0yMDI2LXN1cGVyLXNlY3VyZS1rZXktMTIzNDU2Nzg5MA==
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

file:
  upload-path: ./uploads/
